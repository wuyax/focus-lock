<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLock Config</title>
    <style>
        :root {
            --primary-color: #2196F3;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1, h2 {
            margin-top: 0;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            margin-right: 10px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #1976D2;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-item {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            display: block;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        #message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success { background-color: #c8e6c9; color: #2e7d32; display: block !important; }
        .error { background-color: #ffcdd2; color: #c62828; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>FocusLock</h1>
        
        <div class="card">
            <h2>Statistics</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="stat-pomodoros">-</span>
                    <span class="stat-label">Total Pomodoros</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-work">-</span>
                    <span class="stat-label">Work Minutes</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-rest">-</span>
                    <span class="stat-label">Rest Minutes</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Configuration</h2>
            <form id="config-form">
                <div class="form-group">
                    <label for="work_time_min">Work Time (min)</label>
                    <input type="number" id="work_time_min" name="work_time_min" min="1" max="120" required>
                </div>
                <div class="form-group">
                    <label for="rest_time_min">Rest Time (min)</label>
                    <input type="number" id="rest_time_min" name="rest_time_min" min="1" max="60" required>
                </div>
                <div class="form-group">
                    <label for="warning_time_sec">Warning Time (sec)</label>
                    <input type="number" id="warning_time_sec" name="warning_time_sec" min="0" max="300" required>
                </div>
                <div class="form-group">
                    <label for="lock_shortcut">Lock Shortcut (e.g. Win+L)</label>
                    <input type="text" id="lock_shortcut" name="lock_shortcut" maxlength="15" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="repeat_lock" name="repeat_lock">
                        Repeat Lock during Work
                    </label>
                </div>
                <div class="form-group">
                    <label for="repeat_interval_sec">Repeat Interval (sec)</label>
                    <input type="number" id="repeat_interval_sec" name="repeat_interval_sec" min="1" max="3600">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="buzzer_enabled" name="buzzer_enabled">
                        Buzzer Enabled
                    </label>
                </div>
                <div class="form-group">
                    <label for="led_brightness">LED Brightness (0-255)</label>
                    <input type="number" id="led_brightness" name="led_brightness" min="0" max="255" required>
                </div>
                <button type="submit">Save Configuration</button>
            </form>
            <div id="message"></div>
        </div>
    </div>

    <script>
        async function fetchConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                
                document.getElementById('work_time_min').value = data.work_time_min;
                document.getElementById('rest_time_min').value = data.rest_time_min;
                document.getElementById('warning_time_sec').value = data.warning_time_sec;
                document.getElementById('lock_shortcut').value = data.lock_shortcut;
                document.getElementById('repeat_lock').checked = data.repeat_lock;
                document.getElementById('repeat_interval_sec').value = data.repeat_interval_sec;
                document.getElementById('buzzer_enabled').checked = data.buzzer_enabled;
                document.getElementById('led_brightness').value = data.led_brightness;
            } catch (err) {
                console.error('Failed to fetch config', err);
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('stat-pomodoros').innerText = data.total_pomodoros;
                document.getElementById('stat-work').innerText = data.total_work_min;
                document.getElementById('stat-rest').innerText = data.total_rest_min;
            } catch (err) {
                console.error('Failed to fetch stats', err);
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const config = {
                work_time_min: parseInt(formData.get('work_time_min')),
                rest_time_min: parseInt(formData.get('rest_time_min')),
                warning_time_sec: parseInt(formData.get('warning_time_sec')),
                lock_shortcut: formData.get('lock_shortcut'),
                repeat_lock: document.getElementById('repeat_lock').checked,
                repeat_interval_sec: parseInt(formData.get('repeat_interval_sec')),
                buzzer_enabled: document.getElementById('buzzer_enabled').checked,
                led_brightness: parseInt(formData.get('led_brightness'))
            };

            const message = document.getElementById('message');
            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                if (response.ok) {
                    message.innerText = 'Configuration saved successfully!';
                    message.className = 'success';
                } else {
                    throw new Error('Failed to save config');
                }
            } catch (err) {
                message.innerText = 'Error: ' + err.message;
                message.className = 'error';
            }
            setTimeout(() => { message.style.display = 'none'; }, 3000);
        });

        // Initial fetch
        fetchConfig();
        fetchStats();
        // Refresh stats every 30 seconds
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
